# ─────────────────────────────────────────────────────────────
# WeaveAI — Nginx site config
# 80  → 初次访问时强制走 ACME http-01 验证（certbot challenge）
# 443 → 启用 HTTPS，反代到 app:3000
# ─────────────────────────────────────────────────────────────

# ── 80 端口：HTTP → HTTPS 跳转 + ACME challenge 路径放行 ──
server {
    listen 80;
    listen [::]:80;
    server_name localwise.top www.localwise.top;

    # ACME http-01 challenge — certbot 通过这个路径校验域名所有权
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # 其他全部重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── 443 端口：HTTPS，反代到 app:3000 ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name localwise.top www.localwise.top;

    # SSL 证书（certbot 申请后会自动写入此路径）
    ssl_certificate     /etc/letsencrypt/live/localwise.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/localwise.top/privkey.pem;

    # SSL 优化配置
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # HSTS（可选：第一次启用 HTTPS 后再开，避免回退成本）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 反向代理到 nextjs app
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # SSE / 长连接支持（Agent 流式响应必须）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        chunked_transfer_encoding off;
    }

    # 静态资源缓存（Next.js 静态文件 + excalidraw-assets）
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|ico|png|jpe?g|gif|svg|webp|map)$ {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }
}